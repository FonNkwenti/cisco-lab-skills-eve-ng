- command: router ospfv3 1
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: fail
  notes: OSPFv3 process (IOS 15.0+) — supports both IPv4 and IPv6 address families
- command: ospfv3 1 ipv4 area 0
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: fail
  notes: Enable OSPFv3 IPv4 AF on interface; requires 'router ospfv3' process
- command: ospfv3 1 ipv6 area 0
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: fail
