platforms:
  # ─── Active EVE-NG platforms ─────────────────────────────────────────────────
  iosv:
    ios: "15.9(3)M6"
    type: qemu
    group: ios-classic
    console_port: null   # Dynamic — discovered via EVE-NG REST API
    deprecated: false
  iosvl2:
    ios: "15.x (high_iron_20200929)"
    type: qemu
    group: ios-l2
    console_port: null
    deprecated: false
  csr1000v:
    ios: "17.03.05"
    type: qemu
    group: ios-xe
    console_port: null
    deprecated: false
  iol_l3:
    ios: "15.7(3)M"
    type: iol
    group: ios-classic
    console_port: null
    deprecated: false
  iol_l2:
    ios: "15.x (high_iron_20190423)"
    type: iol
    group: ios-l2
    console_port: null
    deprecated: false
  # ─── SD-WAN (Viptela OS) — added 2026-04-11 ─────────────────────────────────
  vmanage:
    ios: "20.6.2"
    type: qemu
    group: sdwan
    console_port: null
    image: vtmgmt-20.6.2-001
    role: management-controller
    deprecated: false
  vbond:
    ios: "20.6.2"
    type: qemu
    group: sdwan
    console_port: null
    image: vtbond-20.6.2
    role: orchestrator
    deprecated: false
  vsmart:
    ios: "20.6.2"
    type: qemu
    group: sdwan
    console_port: null
    image: vtsmart-20.6.2
    role: control-plane
    deprecated: false
  vedge:
    ios: "20.6.2"
    type: qemu
    group: sdwan
    console_port: null
    image: vtedge-20.6.2
    role: data-plane
    deprecated: false
  # ─── Legacy Dynamips platforms (GNS3 / Apple Silicon era) ────────────────────
  c7200:
    ios: "15.3(3)XB12"
    type: dynamips
    group: ios-classic
    console_port: 5001
    deprecated: true
  c3725:
    ios: "12.4(15)T14"
    type: dynamips
    group: ios-classic
    console_port: 5002
    deprecated: true

# context values: global | interface | interface-switch | router-eigrp | router-eigrp-named | af-ipv4-unicast | router-ospf | router-ospfv3 | router-bgp | af-ipv4-bgp
commands:
  # ─── EIGRP ───────────────────────────────────────────────────────────────────
  - command: "router eigrp ENARSI"
    context: global
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: fail
    notes: "Named-mode EIGRP process requires IOS 15.0+. IOSv=pass, IOL L3=pass, c7200=pass, c3725=fail (IOS 12.4)"

  - command: "address-family ipv4 unicast autonomous-system 100"
    context: router-eigrp-named
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: fail
    notes: "Named mode address-family requires IOS 15.0+"

  - command: "ip authentication mode eigrp 100 md5"
    context: interface
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: unknown
    c3725: unknown
    notes: ""

  - command: "ip authentication key-chain eigrp 100 EIGRP_AUTH"
    context: interface
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: unknown
    c3725: unknown
    notes: ""

  - command: "ip summary-address eigrp 100 10.0.0.0 255.0.0.0"
    context: interface
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: unknown
    c3725: unknown
    notes: ""

  - command: "distribute-list prefix PFX_OUT out"
    context: router-eigrp
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: unknown
    c3725: unknown
    notes: ""

  - command: "route-map RM_POLICY permit 10"
    context: global
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: unknown
    c3725: unknown
    notes: ""

  - command: "distribute-list prefix PFX_DENY_R4_STUB out FastEthernet0/0"
    context: af-ipv4-unicast
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: unknown
    c3725: unknown
    notes: "Named mode EIGRP — must be under topology base sub-mode. Use GigabitEthernet0/0 for IOSv."

  - command: "distribute-list route-map RM_TAG_BRANCH_A out"
    context: af-ipv4-unicast
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: unknown
    c3725: unknown
    notes: "Named mode EIGRP — route-map based distribute-list under topology base"

# ─── OSPF (OSPFv2) — verified in ENCOR OSPF labs 01–08 ──────────────────────

  - command: "router ospf 1"
    context: global
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "OSPFv2 process — verified in ENCOR labs 01–08"

  - command: "network 10.0.0.0 0.0.0.3 area 0"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "OSPF network statement — wildcard mask + area; any address/mask/area values"

  - command: "ip ospf network point-to-point"
    context: interface
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Override OSPF network type on broadcast/serial links"

  - command: "ip ospf cost 10"
    context: interface
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Manual OSPF cost override"

  - command: "ip ospf priority 100"
    context: interface
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "DR election priority; 0 = never elected DR"

  - command: "ip ospf authentication message-digest"
    context: interface
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Enable MD5 auth on interface; pair with ip ospf message-digest-key"

  - command: "ip ospf message-digest-key 1 md5 KEY"
    context: interface
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "MD5 key for OSPF interface authentication"

  - command: "ip ospf authentication key-chain OSPF_AUTH"
    context: interface
    ios-classic: unknown
    ios-l2: unknown
    ios-xe: unknown
    c7200: unknown
    c3725: unknown
    notes: "Key-chain auth (IOS 15.3+) — untested; use MD5 as safe alternative"

  - command: "area 1 stub"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: ""

  - command: "area 1 stub no-summary"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Totally stubby area — ABR config only"

  - command: "area 1 nssa"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: ""

  - command: "area 1 nssa no-summary"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Totally NSSA — ABR config only"

  - command: "area 1 authentication message-digest"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Area-wide MD5 auth — applies to all interfaces in the area"

  - command: "area 1 range 10.1.0.0 255.255.0.0"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "ABR inter-area route summarization"

  - command: "default-information originate"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Redistribute default route into OSPF; requires default route in RIB"

  - command: "redistribute connected subnets"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "subnets keyword required to include non-classful routes"

  - command: "redistribute eigrp 100 subnets route-map MAP"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Mutual redistribution; always use route-map to tag and control metrics"

# ─── OSPFv3 — IOS 15.0+ ──────────────────────────────────────────────────────

  - command: "router ospfv3 1"
    context: global
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: fail
    notes: "OSPFv3 process (IOS 15.0+) — supports both IPv4 and IPv6 address families"

  - command: "ospfv3 1 ipv4 area 0"
    context: interface
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: fail
    notes: "Enable OSPFv3 IPv4 AF on interface; requires 'router ospfv3' process"

  - command: "ospfv3 1 ipv6 area 0"
    context: interface
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: fail
    notes: "Enable OSPFv3 IPv6 AF on interface"

  - command: "redistribute ospfv3 1 subnets"
    context: router-ospf
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: fail
    notes: "Redistribute OSPFv3 routes into OSPFv2; IOS 15.0+ only"

# ─── BGP — verified in ENCOR BGP lab-01 ─────────────────────────────────────

  - command: "router bgp 65001"
    context: global
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "BGP process — verified in ENCOR BGP lab-01 (basic eBGP peering)"

  - command: "bgp router-id 10.1.1.1"
    context: router-bgp
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Explicit BGP router-id; prevents ambiguity in multi-interface routers"

  - command: "bgp log-neighbor-changes"
    context: router-bgp
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Log BGP neighbor state transitions to syslog"

  - command: "neighbor 10.0.0.1 remote-as 65002"
    context: router-bgp
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Define BGP peer; eBGP when AS differs, iBGP when AS matches"

  - command: "neighbor 10.0.0.1 description ISP-1"
    context: router-bgp
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: ""

  - command: "network 10.1.1.1 mask 255.255.255.255"
    context: router-bgp
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Advertise prefix into BGP; exact match required in RIB"

  - command: "address-family ipv4"
    context: router-bgp
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Enter BGP IPv4 unicast AF; required for neighbor activation in modern IOS"

  - command: "neighbor 10.0.0.1 activate"
    context: af-ipv4-bgp
    ios-classic: pass
    ios-l2: unknown
    ios-xe: pass
    c7200: pass
    c3725: pass
    notes: "Activate BGP peer in IPv4 unicast address-family"

# ─── Switching (IOSvL2 / IOL L2) ─────────────────────────────────────────────
# NOTE: interface-switch context uses GigabitEthernet1/0 (IOSvL2) or Ethernet0/0 (IOL L2).
#       IOSv and CSR1000v have no layer-2 switch ports — all switchport commands fail there.

  - command: "switchport mode access"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: "IOSvL2 / IOL L2 switch port access mode"

  - command: "switchport mode trunk"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: ""

  - command: "switchport access vlan 10"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: ""

  - command: "switchport trunk encapsulation dot1q"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: "Required before 'switchport mode trunk'"

  - command: "switchport trunk native vlan 99"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: ""

  - command: "switchport trunk allowed vlan 10,20,30"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: ""

  - command: "switchport nonegotiate"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: "Disable DTP; always use on manually configured trunk ports"

  - command: "spanning-tree portfast"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: "Per-interface PortFast"

  - command: "spanning-tree vlan 10 priority 4096"
    context: global
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: unknown
    c3725: pass
    notes: "Per-VLAN STP priority — must be multiple of 4096"

  - command: "channel-group 1 mode on"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: unknown
    c3725: pass
    notes: "Static EtherChannel"

  - command: "spanning-tree portfast default"
    context: global
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: unknown
    c3725: fail
    notes: "Global PortFast — supported on IOSvL2; NOT supported on c3725 IOS 12.4"

  - command: "spanning-tree mode rapid-pvst"
    context: global
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: unknown
    c3725: fail
    notes: "RSTP — supported on IOSvL2 (IOS 15.x); NOT supported on c3725 IOS 12.4"

  - command: "spanning-tree bpduguard enable"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: unknown
    c3725: fail
    notes: "BPDU Guard — supported on IOSvL2; NOT supported on c3725 IOS 12.4"

  - command: "channel-group 1 mode active"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: unknown
    c3725: fail
    notes: "LACP — supported on IOSvL2; NOT supported on c3725 IOS 12.4"

  - command: "channel-group 1 mode desirable"
    context: interface-switch
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: unknown
    c3725: fail
    notes: "PAgP — supported on IOSvL2; NOT supported on c3725 IOS 12.4"

  - command: "vtp domain ENCOR-LAB"
    context: global
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: "VTP domain config — IOSvL2/IOL L2/NM-16ESW only"

  - command: "vtp mode server"
    context: global
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: ""

  - command: "vtp version 2"
    context: global
    ios-classic: fail
    ios-l2: pass
    ios-xe: fail
    c7200: fail
    c3725: pass
    notes: ""
