  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Area-wide MD5 auth — applies to all interfaces in the area
- command: area 1 range 10.1.0.0 255.255.0.0
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: ABR inter-area route summarization
- command: default-information originate
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Redistribute default route into OSPF; requires default route in RIB
- command: redistribute connected subnets
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
