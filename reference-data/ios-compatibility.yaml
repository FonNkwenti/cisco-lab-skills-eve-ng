    type: dynamips
    group: ios-classic
    console_port: 5001
    deprecated: true
  c3725:
    ios: 12.4(15)T14
    type: dynamips
    group: ios-classic
    console_port: 5002
    deprecated: true
# Per-command compatibility rows.
# Per-platform-group flag values: pass | fail | unknown
# Recognised flags: ios-classic | ios-l2 | ios-xe | ios-xr | sdwan
# Add a flag column only when that group has been empirically probed for the
# command. Omit the flag (rather than writing 'unknown' on every row) when no
# probe has been done; absence means "not yet verified".
# XR rows are typically added by probing on PROBE-XRv first, then PROBE-XRv9k
# only if behaviour diverges between classic XRv and XRv9k.
commands:
- command: router eigrp ENARSI
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: fail
  notes: Named-mode EIGRP process requires IOS 15.0+. IOSv=pass, IOL L3=pass, c7200=pass,
    c3725=fail (IOS 12.4)
- command: address-family ipv4 unicast autonomous-system 100
  context: router-eigrp-named
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: fail
  notes: Named mode address-family requires IOS 15.0+
- command: ip authentication mode eigrp 100 md5
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: ''
- command: ip authentication key-chain eigrp 100 EIGRP_AUTH
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: ''
- command: ip summary-address eigrp 100 10.0.0.0 255.0.0.0
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: ''
- command: distribute-list prefix PFX_OUT out
  context: router-eigrp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: ''
- command: route-map RM_POLICY permit 10
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: ''
- command: distribute-list prefix PFX_DENY_R4_STUB out FastEthernet0/0
  context: af-ipv4-unicast
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: Named mode EIGRP — must be under topology base sub-mode. Use GigabitEthernet0/0
    for IOSv.
- command: distribute-list route-map RM_TAG_BRANCH_A out
  context: af-ipv4-unicast
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: Named mode EIGRP — route-map based distribute-list under topology base
- command: router ospf 1
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: OSPFv2 process — verified in ENCOR labs 01–08
- command: network 10.0.0.0 0.0.0.3 area 0
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: OSPF network statement — wildcard mask + area; any address/mask/area values
- command: ip ospf network point-to-point
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Override OSPF network type on broadcast/serial links
- command: ip ospf cost 10
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Manual OSPF cost override
- command: ip ospf priority 100
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: DR election priority; 0 = never elected DR
- command: ip ospf authentication message-digest
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Enable MD5 auth on interface; pair with ip ospf message-digest-key
- command: ip ospf message-digest-key 1 md5 KEY
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: MD5 key for OSPF interface authentication
- command: ip ospf authentication key-chain OSPF_AUTH
  context: interface
  ios-classic: unknown
  ios-l2: unknown
  ios-xe: unknown
  c7200: unknown
  c3725: unknown
  notes: Key-chain auth (IOS 15.3+) — untested; use MD5 as safe alternative
- command: area 1 stub
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: ''
- command: area 1 stub no-summary
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Totally stubby area — ABR config only
- command: area 1 nssa
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: ''
- command: area 1 nssa no-summary
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Totally NSSA — ABR config only
- command: area 1 authentication message-digest
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Area-wide MD5 auth — applies to all interfaces in the area
- command: area 1 range 10.1.0.0 255.255.0.0
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: ABR inter-area route summarization
- command: default-information originate
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Redistribute default route into OSPF; requires default route in RIB
- command: redistribute connected subnets
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: subnets keyword required to include non-classful routes
- command: redistribute eigrp 100 subnets route-map MAP
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Mutual redistribution; always use route-map to tag and control metrics
- command: router ospfv3 1
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: fail
  notes: OSPFv3 process (IOS 15.0+) — supports both IPv4 and IPv6 address families
- command: ospfv3 1 ipv4 area 0
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: fail
  notes: Enable OSPFv3 IPv4 AF on interface; requires 'router ospfv3' process
- command: ospfv3 1 ipv6 area 0
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: fail
  notes: Enable OSPFv3 IPv6 AF on interface
- command: redistribute ospfv3 1 subnets
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: fail
  notes: Redistribute OSPFv3 routes into OSPFv2; IOS 15.0+ only
- command: router bgp 65001
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: BGP process — verified in ENCOR BGP lab-01 (basic eBGP peering)
- command: bgp router-id 10.1.1.1
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Explicit BGP router-id; prevents ambiguity in multi-interface routers
- command: bgp log-neighbor-changes
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Log BGP neighbor state transitions to syslog
- command: neighbor 10.0.0.1 remote-as 65002
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Define BGP peer; eBGP when AS differs, iBGP when AS matches
- command: neighbor 10.0.0.1 description ISP-1
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: ''
- command: network 10.1.1.1 mask 255.255.255.255
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Advertise prefix into BGP; exact match required in RIB
- command: address-family ipv4
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Enter BGP IPv4 unicast AF; required for neighbor activation in modern IOS
- command: neighbor 10.0.0.1 activate
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Activate individual BGP peer in IPv4 unicast address-family
- command: neighbor PEER-GROUP activate
  context: af-ipv4-bgp
  ios-classic: fail
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: >
    Peer-group TEMPLATE activation in address-family ipv4. Fails on IOSv (confirmed
    15.6(2)T, likely all IOSv) with "Activation failed: configure bgp listener range
    before activating peergroup" — IOS interprets this as Dynamic Neighbors and requires
    bgp listen range first. Workaround: activate each member individually
    (neighbor 10.0.0.X activate); members still inherit all peer-group attributes
    (remote-as, update-source, next-hop-self). Passes on IOS-XE (CSR1000v 17.03.05).
- command: neighbor 10.0.0.1 update-source Loopback0
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Source iBGP TCP session from loopback; required for loopback-peering resilience
- command: neighbor 10.0.0.1 next-hop-self
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Replace eBGP next-hop with local address so iBGP peers can resolve forwarding
- command: neighbor 10.0.0.1 route-reflector-client
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Mark neighbor as RR client; RR will reflect routes between clients
- command: bgp cluster-id 10.0.0.4
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Set RR cluster ID; prevents routing loops when multiple RRs share the same
    cluster
- command: ip prefix-list PFX-NAME seq 5 permit 172.16.1.0/24
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Named prefix-list for route filtering; available since IOS 11.1
- command: no ip prefix-list PFX-NAME seq 5
  context: global
  ios-classic: fail
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: >
    Seq-only deletion rejected on IOSv with "% Incomplete command." — the full entry
    text is required, or use "no ip prefix-list NAME" to drop the entire list then
    re-add. IOS-XE (CSR1000v 17.03.05) accepts seq-only deletion. Workaround applies
    to all ios-classic targets; confirmed on IOSv 15.6(2)T.
- command: match ip address prefix-list PFX-NAME
  context: route-map
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Match prefix-list in route-map; available since IOS 12.0
- command: set local-preference 200
  context: route-map
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Set BGP LOCAL_PREF; iBGP-only attribute, higher value is preferred
- command: set metric 10
  context: route-map
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Set BGP MED (MULTI_EXIT_DISC); lower value is preferred; non-transitive
- command: set as-path prepend 65001
  context: route-map
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Prepend own AS to make path appear longer and less preferred
- command: neighbor 10.0.0.1 route-map RM-NAME in
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Apply route-map to inbound updates from neighbor; triggers soft-reconfiguration
- command: neighbor 10.0.0.1 route-map RM-NAME out
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Apply route-map to outbound updates to neighbor
- command: neighbor 10.0.0.1 ttl-security hops 1
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: unknown
  notes: 'GTSM: sender sets TTL=255; receiver checks TTL >= (256-N). Direct eBGP peers
    use hops 1. Verified IOSv lab-03.'
- command: neighbor 10.0.0.1 password CISCO_SP
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: unknown
  notes: TCP-MD5 session authentication. Mismatch causes silent segment drops and
    hold-timer expiry — no NOTIFICATION generated.
- command: neighbor 10.0.0.1 maximum-prefix 100 75 warning-only
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: unknown
  notes: Log warning at 75% threshold; session stays up. Without warning-only the
    session tears down when limit is exceeded.
- command: neighbor 10.0.0.1 maximum-prefix 100 restart 5
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: unknown
  notes: Tear down session when limit exceeded; auto-reconnect after 5 minutes. Without
    restart, manual clear is required.
- command: switchport mode access
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: IOSvL2 / IOL L2 switch port access mode
- command: switchport mode trunk
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: ''
- command: switchport access vlan 10
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: ''
- command: switchport trunk encapsulation dot1q
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: Required before 'switchport mode trunk'
- command: switchport trunk native vlan 99
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: ''
- command: switchport trunk allowed vlan 10,20,30
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: ''
- command: switchport nonegotiate
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: Disable DTP; always use on manually configured trunk ports
- command: spanning-tree portfast
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: Per-interface PortFast
- command: spanning-tree vlan 10 priority 4096
  context: global
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: unknown
  c3725: pass
  notes: Per-VLAN STP priority — must be multiple of 4096
- command: channel-group 1 mode on
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: unknown
  c3725: pass
  notes: Static EtherChannel
- command: spanning-tree portfast default
  context: global
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: unknown
  c3725: fail
  notes: Global PortFast — supported on IOSvL2; NOT supported on c3725 IOS 12.4
- command: spanning-tree mode rapid-pvst
  context: global
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: unknown
  c3725: fail
  notes: RSTP — supported on IOSvL2 (IOS 15.x); NOT supported on c3725 IOS 12.4
- command: spanning-tree bpduguard enable
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: unknown
  c3725: fail
  notes: BPDU Guard — supported on IOSvL2; NOT supported on c3725 IOS 12.4
- command: channel-group 1 mode active
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: unknown
  c3725: fail
  notes: LACP — supported on IOSvL2; NOT supported on c3725 IOS 12.4
- command: channel-group 1 mode desirable
  context: interface-switch
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: unknown
  c3725: fail
  notes: PAgP — supported on IOSvL2; NOT supported on c3725 IOS 12.4
- command: vtp domain ENCOR-LAB
  context: global
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: VTP domain config — IOSvL2/IOL L2/NM-16ESW only
- command: vtp mode server
  context: global
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: ''
- command: vtp version 2
  context: global
  ios-classic: fail
  ios-l2: pass
  ios-xe: fail
  c7200: fail
  c3725: pass
  notes: ''
- command: mpls traffic-eng tunnels
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: Enables MPLS TE globally on IOSv 15.9(3)M6. Required on every node in the
    TE domain. Verified in SPRI MPLS lab-03.
  c7200: unknown
  c3725: unknown
- command: mpls traffic-eng tunnels
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: Enables TE on a specific interface so RSVP PATH messages are accepted and
    the link appears in the TED. Verified on IOSv 15.9(3)M6 (SPRI MPLS lab-03).
  c7200: unknown
  c3725: unknown
- command: mpls traffic-eng level-2
  context: router-isis
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: Enables IS-IS TE flooding (Extended IS Reachability TLVs) on IOSv 15.9(3)M6.
    Without this the router is invisible in the TE topology. Verified SPRI MPLS lab-03.
  c7200: unknown
  c3725: unknown
- command: mpls traffic-eng router-id Loopback0
  context: router-isis
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: Sets the TE router-ID advertised in IS-IS TE LSPs. Must match the tunnel
    destination address on the headend. Verified on IOSv 15.9(3)M6 (SPRI MPLS lab-03).
  c7200: unknown
  c3725: unknown
- command: ip rsvp bandwidth 100000 100000
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: >
    Reserves RSVP bandwidth on the interface and advertises it in the TED. Format:
    "ip rsvp bandwidth <global-kbps> <per-flow-kbps>". CSPF prunes links where
    available < requested; setting too low (e.g. 10 10) causes CSPF to fail for
    any tunnel > 10 kbps. Verified on IOSv 15.9(3)M6 (SPRI MPLS lab-03).
  c7200: unknown
  c3725: unknown
- command: tunnel mode mpls traffic-eng
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: Sets the tunnel encapsulation to RSVP-TE. Required on the headend tunnel
    interface. Verified on IOSv 15.9(3)M6 (SPRI MPLS lab-03).
  c7200: unknown
  c3725: unknown
- command: tunnel destination 10.0.0.4
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: >
    Standard tunnel destination command — NOT "tunnel mpls traffic-eng destination".
    The mpls traffic-eng prefix does NOT apply to destination. Use plain
    "tunnel destination <ip>" for RSVP-TE tunnels, same as GRE tunnels.
    Verified on IOSv 15.9(3)M6 (SPRI MPLS lab-03).
  c7200: unknown
  c3725: unknown
- command: tunnel mpls traffic-eng path-option 10 dynamic
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: Dynamic CSPF path — TE computes best path from TED on the headend. Lower
    option number = higher preference. Verified on IOSv 15.9(3)M6 (SPRI MPLS lab-03).
  c7200: unknown
  c3725: unknown
- command: ip explicit-path name PE1-via-P2 enable
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: >
    Global config command — NOT interface context. Defines a named explicit path
    for CSPF to follow. Sub-commands: "next-address loose <ip>" (loose hop = CSPF
    routes to the waypoint) or "next-address strict <ip>" (must be directly connected).
    Verified on IOSv 15.9(3)M6 (SPRI MPLS lab-03).
  c7200: unknown
  c3725: unknown
- command: next-address loose 10.0.0.3
  context: ip-explicit-path
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: >
    The "loose" keyword PRECEDES the IP address: "next-address loose <ip>", NOT
    "next-address <ip> loose". Typing "next-address <ip> ?" shows only <cr> — the
    loose keyword must come before the address. Verified on IOSv 15.9(3)M6.
    Non-loose form "next-address <ip>" (strict hop) also passes.
  c7200: unknown
  c3725: unknown
- command: tunnel mpls traffic-eng autoroute announce
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: Installs the tunnel destination in the IGP routing table via the tunnel
    interface (autoroute). "show ip route <dest>" shows via Tunnel interface.
    Verified on IOSv 15.9(3)M6 (SPRI MPLS lab-03).
  c7200: unknown
  c3725: unknown
- command: tunnel mpls traffic-eng path-option 20 dynamic lockdown
  context: interface
  ios-classic: unknown
  ios-l2: unknown
  ios-xe: unknown
  notes: Lockdown prevents fallback to a lower-preference path-option. Not tested
    on IOSv; treat as unknown.
  c7200: unknown
  c3725: unknown
- command: tunnel mpls traffic-eng bandwidth 10000
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: Requested bandwidth in kbps — used by CSPF to prune links with insufficient
    available bandwidth before path computation. Verified on IOSv 15.9(3)M6.
  c7200: unknown
  c3725: unknown
- command: tunnel mpls traffic-eng priority 1 1
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: >
    Setup priority / hold priority. Range 0–7; lower = higher priority. Default 7/7.
    Priority 1/1 allows this tunnel to preempt most other tunnels during RSVP
    admission. Verified on IOSv 15.9(3)M6 (SPRI MPLS lab-03).
  c7200: unknown
  c3725: unknown
- command: mpls ldp sync
  context: router-isis
  ios-classic: unknown
  ios-l2: unknown
  ios-xe: unknown
  notes: LDP-IGP synchronization — holds IGP metric at max until LDP session is up.
    Not tested on IOSv; treat as unknown.
  c7200: unknown
  c3725: unknown
- command: mpls mtu override 1508
  context: interface
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: >
    IOSv requires the "override" keyword: "mpls mtu override <size>". The bare
    "mpls mtu <size>" form used on physical IOS is rejected with "Invalid input".
    Verified on IOSv 15.9(3)M6 (SPRI MPLS lab-03). Always use override form in
    configs targeting ios-classic EVE-NG images.
  c7200: unknown
  c3725: unknown
- command: mpls mtu 1508
  context: interface
  ios-classic: fail
  ios-l2: unknown
  ios-xe: unknown
  notes: Rejected on IOSv with "Invalid input". Use "mpls mtu override 1508" instead.
    Physical IOS platforms accept this form; IOSv does not.
  c7200: unknown
  c3725: unknown
- command: show mpls traffic-eng tunnels Tunnel10 detail
  context: exec
  ios-classic: fail
  ios-l2: unknown
  ios-xe: unknown
  notes: >
    The "detail" keyword is rejected on IOSv 15.9(3)M6 when a specific tunnel name
    is given — "Invalid input" at "detail". Use "show mpls traffic-eng tunnels Tunnel10"
    (no detail) — specifying a single tunnel already returns full verbose output.
    The "detail" keyword IS valid when listing all tunnels:
    "show mpls traffic-eng tunnels detail" (no tunnel name) passes.
  c7200: unknown
  c3725: unknown
- command: show mpls interfaces detail
  context: exec
  ios-classic: pass
  ios-l2: unknown
  ios-xe: unknown
  notes: >
    IOSv 15.9(3)M6 reports "LSP Tunnel labeling enabled" / "LSP Tunnel labeling
    not enabled" — NOT "Traffic Engineering: enabled" as shown in Cisco documentation
    and physical IOS. Use "LSP Tunnel labeling enabled" as the expected string in
    workbook verification steps and preflight checks targeting IOSv.
  c7200: unknown
  c3725: unknown
- command: nsf ietf
  context: router-isis
  ios-classic: fail
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: >
    IS-IS Graceful Restart per RFC 5306. REJECTED on IOSv 15.6(2)T and
    15.9(3)M6 — the nsf command does not exist under router isis on these builds.
    IS-IS GR requires hardware-plane separation (CEF on a separate line card from
    the RP), which does not exist in a fully virtualised router. Available on
    IOS-XE, physical IOS 15.4+, IOS-XR, ASR 9000. Both sides must configure
    nsf ietf for full GR operation.
- command: nsr
  context: router-isis
  ios-classic: fail
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: >
    IS-IS Nonstop Routing. REJECTED on IOSv 15.6(2)T and 15.9(3)M6 —
    the nsr command is not present in the IOSv command set under router isis.
    NSR requires a dual-RP platform (standby RP maintains protocol state for
    seamless switchover). Available on IOS-XE, IOS-XR, ASR 9000, NCS, CRS.
    Single-RP virtualised platforms (IOSv) cannot support NSR.
- command: bgp graceful-restart
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: >
    BGP Graceful Restart per RFC 4724. Available on IOSv 15.9(3)M6.
    Enables GR capability advertisement to BGP peers. Both sides must advertise
    GR capability for full restart protection. Works for both iBGP and eBGP sessions.
- command: bgp nsr
  context: router-bgp
  ios-classic: fail
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: >
    BGP Nonstop Routing. REJECTED on IOSv 15.6(2)T and 15.9(3)M6 —
    the bgp nsr command is not present in the IOSv command set under router bgp.
    NSR maintains all BGP state on a standby RP for seamless switchover.
    Available on IOS-XE, IOS-XR, ASR 9000, NCS, CRS. Single-RP virtualised
    platforms (IOSv) cannot support NSR.
- command: bfd fast-detect
  context: router-isis-interface-af-ipv4-unicast
  xrv: fail
  xrv9k: fail
  notes: >
    REJECTED on both XRv 6.3.1 and XRv9k 24.3.1 inside the IS-IS interface
    address-family context. Error: % Invalid input detected at '^' marker.
    BFD is activated under IS-IS by setting bfd minimum-interval and
    bfd multiplier at the interface level only — no separate enable command
    is needed. Remove this line from any config targeting ios-xr platforms.
- command: index N address ipv4 X.X.X.X
  context: segment-routing-traffic-eng-segment-list
  xrv: fail
  xrv9k: fail
  notes: >
    REJECTED on both XRv 6.3.1 and XRv9k 24.3.1 inside segment-list entries.
    Error: % Invalid input detected at '^' marker. The address ipv4 form for
    node-SID addressing was removed in IOS-XR 7.x+. Use mpls label form instead:
    'index N mpls label XXXXX' where label = SRGB-base + prefix-SID-index.
    With SRGB 16000-23999: R1=16001, R2=16002, R3=16003, R4=16004.
- command: index N mpls label XXXXX
  context: segment-routing-traffic-eng-segment-list
  xrv: fail
  xrv9k: pass
  notes: >
    PASS on XRv9k 24.3.1. FAIL on XRv 6.3.1 — the segment-list command itself
    does not exist in the 6.3.1 traffic-eng context (named segment-lists were
    introduced in IOS-XR 7.x). Use mpls label form for all XRv9k segment-list
    configs. Label = SRGB-base (16000) + prefix-SID-index.
- command: show isis fast-reroute topology ipv4 unicast
  context: exec
  xrv9k: fail
  notes: >
    REJECTED on XRv9k (tested 7.1.1 and 24.3.1). Error: % Invalid input detected
    at '^' marker. The 'topology' subcommand does not exist in the XR isis
    fast-reroute show tree. Use 'show isis fast-reroute detail' instead for
    per-prefix FRR backup visibility.
- command: show isis fast-reroute ipv4 <prefix>
  context: exec
  xrv9k: fail
  notes: >
    REJECTED on XRv9k (tested 7.1.1 and 24.3.1). Error: % Invalid input detected
    at '^' marker. Use 'show isis fast-reroute detail <prefix>' for per-prefix
    FRR detail on IOS-XR platforms.
- command: show isis fast-reroute detail
  context: exec
  xrv9k: pass
  notes: >
    PASS on XRv9k. Shows IS-IS FRR backup table for all prefixes including FRR
    backup next-hop, metric, and protection flags (P/NP/LC/D/SRLG). This is the
    correct replacement for the non-existent 'show isis fast-reroute topology'
    command on IOS-XR. Append a prefix (e.g. 'detail 10.0.0.3/32') to filter
    to a single prefix.
- command: | section <pattern>
  context: exec
  ios-classic: pass
  ios-xe: pass
  ios-xr: fail
  xrv: fail
  xrv9k: fail
  notes: >
    NOT supported on IOS-XR. The `| section <pattern>` pipe modifier used on
    IOS-XE/IOSv (displays the section header + all lines under it) is rejected
    on IOS-XR with `% Invalid input detected at '^' marker.`.
    Alternatives on IOS-XR:
    (1) `| include <pattern>` — shows only lines matching the pattern
    (2) `| utility "sed -n '/<pattern>/,/^[^ ]/p'"` — emulates section by
        printing from the header to the next non-indented line
    (3) `| utility "awk '/<pattern>/{flag=1} flag; /^[^ ]/{if(NR>1 && flag)
        flag=0}'"` — awk-based section emulation with header reset
- command: | begin <pattern>
  context: exec
  ios-classic: pass
  ios-xe: pass
  ios-xr: fail
  xrv: fail
  xrv9k: fail
  notes: >
    NOT supported on IOS-XR. The `| begin <pattern>` pipe modifier (displays
    output starting from the first matching line) is rejected on IOS-XR.
    Alternative: `| utility "sed -n '/<pattern>/,$ p'"`
- command: | utility
  context: exec
  ios-classic: unknown
  ios-xe: unknown
  ios-xr: pass
  xrv: pass
  xrv9k: pass
  notes: >
    IOS-XR-only pipe modifier. Passes the show output through a Unix utility
    (sed, awk, grep, cut, sort, uniq, head, tail, wc). This is the most
    powerful alternative to the missing |section and |begin modifiers.
    Examples:
    - `| utility wc -l` — count lines
    - `| utility head -20` — first 20 lines
    - `| utility "grep -v '^$'"` — exclude blank lines
    - `| utility "sed -n '/Lo0/,/^[^ ]/p'"` — emulate | section
- command: | section
  context: exec
  ios-classic: pass
  ios-xe: pass
  ios-xr: fail
  xrv: fail
  xrv9k: fail
  notes: >
    Alias for `| section` — see the `| section` entry above. Same IOS-XR
    limitation. The unquoted pipe modifier must be written with the space:
    `sh isis fast-reroute | section No FRR backup` fails on XR.

- command: bfd minimum-interval 50
  context: router-isis-interface
  xrv: pass
  xrv9k: pass
  notes: >
    Config is accepted on both XRv 6.3.1 and XRv9k. However on classic XRv 6.3.1
    (software forwarding), IS-IS BFD sessions do NOT form even with both sides
    configured. 'show bfd session' returns empty; 'show isis adjacency detail'
    shows BFD IPv4: None. Use 'show isis adjacency detail' on XRv 6.3.1 to confirm
    TI-LFA protection via Adjacency SID '(protected)' status instead.

- command: show mpls forwarding <prefix/len>
  context: exec
  ios-classic: unknown
  ios-xe: pass
  ios-xr: fail
  xrv: fail
  xrv9k: fail
  notes: >
    On IOS-XR, filtering the MPLS forwarding table by prefix REQUIRES the
    'prefix' keyword: 'show mpls forwarding prefix <ip>/<len>'.
    Without it, the IP address is rejected with '% Invalid input detected at
    '^' marker.' The correct forms are:
    - 'show mpls forwarding prefix 10.0.0.3/32'
    - 'show mpls forwarding prefix 10.0.0.3/32 detail'
    On IOS-XE/IOSv the prefix can follow 'forwarding' directly without 'prefix'.

- command: show segment-routing mapping-server prefix-sid-map ipv4 summary
  context: exec
  ios-xr: fail
  xrv: fail
  xrv9k: fail
  notes: >
    'summary' is not a valid keyword after 'prefix-sid-map ipv4'. Rejected with
    '% Invalid input detected at '^' marker.' The correct form is simply:
    'show segment-routing mapping-server prefix-sid-map ipv4' (bare, shows table)
    or 'show segment-routing mapping-server prefix-sid-map ipv4 detail'.
    To see mapping entries received from the MS on a peer router, use:
    'show isis segment-routing prefix-sid-map active-policy'

- command: show segment-routing mapping-server prefix-sid-map ipv4
  context: exec
  ios-xr: pass
  xrv: pass
  xrv9k: pass
  notes: >
    Valid bare form — shows all locally configured SR mapping-server entries in
    table form (Prefix, SID Index, Range, Flags). Add 'detail' for extended info
    (Last Prefix, Last SID Index per entry).

- command: show isis segment-routing prefix-sid-map active-policy
  context: exec
  ios-xr: pass
  xrv: pass
  xrv9k: pass
  notes: >
    Valid on receiving routers — shows SR mapping entries received via IS-IS
    from the mapping server. Complementary to the mapping-server-local command:
    use on peers (not on the mapping server itself) to confirm distribution.

- command: show mpls forwarding prefix <prefix/len>
  context: exec
  ios-xr: pass
  xrv: pass
  xrv9k: pass
  notes: >
    Correct IOS-XR form for filtering the MPLS forwarding table by destination
    prefix. The 'prefix' keyword is mandatory on XR between 'forwarding' and
    the IP prefix. Without 'detail', shows the summary line (local label,
    outgoing label, interface, next-hop). With 'detail', adds Label Stack,
    path flags, backup path info, and '(!) FRR pure backup' entries.

- command: show segment-routing mpls connected-prefix-sid-map ipv4
  context: exec
  ios-xr: fail
  xrv: fail
  xrv9k: fail
  notes: >
    INVALID on IOS-XR. 'show segment-routing mpls' is not a valid subcommand tree;
    valid 'show segment-routing' subcommands are: local-block (SRLB only),
    mapping-server, traffic-eng. To check the configured SRGB range, use
    'show running-config segment-routing' (look at global-block start/end).
    To check label allocations and ownership (SR vs LDP), use 'show mpls label table'.
    For IS-IS SR prefix mappings, use 'show isis segment-routing prefix-sid-map active-policy'.
    For OSPF SR prefix-SID state, use 'show ospf segment-routing'.

- command: show segment-routing mpls state
  context: exec
  ios-xr: fail
  xrv: fail
  xrv9k: fail
  notes: >
    INVALID on IOS-XR. 'show segment-routing mpls' is not a valid subcommand; there is
    no 'state' keyword in the 'show segment-routing' tree. To check label allocation
    conflicts or the contents of the label table, use 'show mpls label table'. To check
    the configured SRGB, use 'show running-config segment-routing'.

- command: show segment-routing local-block
  context: exec
  ios-xr: pass
  xrv: pass
  xrv9k: pass
  notes: >
    Shows SRLB (Segment Routing LOCAL Block) inconsistencies — NOT the SRGB (global block).
    Only accepts the 'inconsistencies' keyword; output shows 'SRLB inconsistencies range:
    Start/End: 0/0' when no conflict exists. This command is NOT useful for SRGB
    verification. To check the SRGB (global-block), use 'show running-config segment-routing'.
    Do not use this as a replacement for SRGB-related queries.

- command: show mpls label table
  context: exec
  ios-xr: pass
  xrv: pass
  xrv9k: pass
  notes: >
    Shows all MPLS label allocations on the router with owner (IS-IS SR, LDP, static).
    Useful for verifying that a specific SR label (e.g. 16050) is allocated and to check
    for label conflicts between SR and LDP. Use after confirming the SRGB with
    'show running-config segment-routing' when a label is still not in the forwarding table.

- command: show ospf segment-routing
  context: exec
  ios-xr: pass
  xrv: pass
  xrv9k: pass
  notes: >
    Shows OSPF SR state and prefix-SID bindings from the local OSPF SR database.
    Displays SR capability, SRGB range, and per-area prefix-SID entries. Valid
    replacement for the invalid 'show segment-routing mpls connected-prefix-sid-map ipv4'
    in OSPF SR labs. Complement with 'show ospf database opaque-area detail' for
    raw LSA-level SID TLV inspection.
