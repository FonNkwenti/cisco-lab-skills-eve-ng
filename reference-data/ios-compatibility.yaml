- command: redistribute ospfv3 1 subnets
  context: router-ospf
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: fail
  notes: Redistribute OSPFv3 routes into OSPFv2; IOS 15.0+ only
- command: router bgp 65001
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: BGP process — verified in ENCOR BGP lab-01 (basic eBGP peering)
- command: bgp router-id 10.1.1.1
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Explicit BGP router-id; prevents ambiguity in multi-interface routers
- command: bgp log-neighbor-changes
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Log BGP neighbor state transitions to syslog
- command: neighbor 10.0.0.1 remote-as 65002
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Define BGP peer; eBGP when AS differs, iBGP when AS matches
- command: neighbor 10.0.0.1 description ISP-1
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: ''
- command: network 10.1.1.1 mask 255.255.255.255
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Advertise prefix into BGP; exact match required in RIB
- command: address-family ipv4
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Enter BGP IPv4 unicast AF; required for neighbor activation in modern IOS
- command: neighbor 10.0.0.1 activate
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Activate individual BGP peer in IPv4 unicast address-family
- command: neighbor PEER-GROUP activate
  context: af-ipv4-bgp
  ios-classic: fail
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: >
    Peer-group TEMPLATE activation in address-family ipv4. Fails on IOSv (confirmed
    15.6(2)T, likely all IOSv) with "Activation failed: configure bgp listener range
    before activating peergroup" — IOS interprets this as Dynamic Neighbors and requires
    bgp listen range first. Workaround: activate each member individually
    (neighbor 10.0.0.X activate); members still inherit all peer-group attributes
    (remote-as, update-source, next-hop-self). Passes on IOS-XE (CSR1000v 17.03.05).
- command: neighbor 10.0.0.1 update-source Loopback0
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Source iBGP TCP session from loopback; required for loopback-peering resilience
- command: neighbor 10.0.0.1 next-hop-self
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Replace eBGP next-hop with local address so iBGP peers can resolve forwarding
- command: neighbor 10.0.0.1 route-reflector-client
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Mark neighbor as RR client; RR will reflect routes between clients
- command: bgp cluster-id 10.0.0.4
  context: router-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Set RR cluster ID; prevents routing loops when multiple RRs share the same
    cluster
- command: ip prefix-list PFX-NAME seq 5 permit 172.16.1.0/24
  context: global
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Named prefix-list for route filtering; available since IOS 11.1
- command: no ip prefix-list PFX-NAME seq 5
  context: global
  ios-classic: fail
  ios-l2: unknown
  ios-xe: pass
  c7200: unknown
  c3725: unknown
  notes: >
    Seq-only deletion rejected on IOSv with "% Incomplete command." — the full entry
    text is required, or use "no ip prefix-list NAME" to drop the entire list then
    re-add. IOS-XE (CSR1000v 17.03.05) accepts seq-only deletion. Workaround applies
    to all ios-classic targets; confirmed on IOSv 15.6(2)T.
- command: match ip address prefix-list PFX-NAME
  context: route-map
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Match prefix-list in route-map; available since IOS 12.0
- command: set local-preference 200
  context: route-map
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Set BGP LOCAL_PREF; iBGP-only attribute, higher value is preferred
- command: set metric 10
  context: route-map
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Set BGP MED (MULTI_EXIT_DISC); lower value is preferred; non-transitive
- command: set as-path prepend 65001
  context: route-map
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
  notes: Prepend own AS to make path appear longer and less preferred
- command: neighbor 10.0.0.1 route-map RM-NAME in
  context: af-ipv4-bgp
  ios-classic: pass
  ios-l2: unknown
  ios-xe: pass
  c7200: pass
  c3725: pass
